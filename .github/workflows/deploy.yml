name: Deploy to Monday.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: boost-sdr-os/quickstart-react
        run: |
          # Install without running any postinstall scripts to avoid apps-cli patch-package failure
          npm install --legacy-peer-deps --ignore-scripts
          # Run only the scripts we actually need
          node node_modules/esbuild/install.js

      - name: Build
        working-directory: boost-sdr-os/quickstart-react
        env:
          VITE_MONDAY_API_TOKEN: ${{ secrets.VITE_MONDAY_API_TOKEN }}
        run: npm run deploy:build

      - name: Deploy to Monday hosting
        working-directory: boost-sdr-os/quickstart-react
        env:
          MAPPS_ACCESS_TOKEN: ${{ secrets.MAPPS_ACCESS_TOKEN }}
        run: |
          echo "{\"accessToken\":\"$MAPPS_ACCESS_TOKEN\"}" > .mappsrc
          npm run deploy:push
