name: Deploy to Monday.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: boost-sdr-os/quickstart-react/package-lock.json

      - name: Install dependencies
        working-directory: boost-sdr-os/quickstart-react
        run: npm ci

      - name: Build
        working-directory: boost-sdr-os/quickstart-react
        env:
          VITE_MONDAY_API_TOKEN: ${{ secrets.VITE_MONDAY_API_TOKEN }}
        run: npm run deploy:build

      - name: Deploy to Monday hosting
        working-directory: boost-sdr-os/quickstart-react
        env:
          MAPPS_ACCESS_TOKEN: ${{ secrets.MAPPS_ACCESS_TOKEN }}
        run: |
          echo "{\"accessToken\":\"$MAPPS_ACCESS_TOKEN\"}" > .mappsrc
          npm run deploy:push
