name: Deploy to Monday.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        working-directory: boost-sdr-os/quickstart-react
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: boost-sdr-os/quickstart-react
        env:
          VITE_MONDAY_API_TOKEN: ${{ secrets.VITE_MONDAY_API_TOKEN }}
        run: npm run deploy:build

      - name: Install Monday CLI
        run: npm install -g @mondaycom/apps-cli@4.9.2

      - name: Deploy to Monday hosting
        working-directory: boost-sdr-os/quickstart-react
        env:
          MAPPS_ACCESS_TOKEN: ${{ secrets.MAPPS_ACCESS_TOKEN }}
          MONDAY_APP_VERSION_ID: ${{ secrets.MONDAY_APP_VERSION_ID }}
        run: |
          echo "{\"accessToken\":\"$MAPPS_ACCESS_TOKEN\"}" > .mappsrc
          mapps code:push --client-side -d build -i $MONDAY_APP_VERSION_ID
