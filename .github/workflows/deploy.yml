name: Deploy to Monday.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: boost-sdr-os/quickstart-react
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          mkdir -p node_modules/parse-gitignore
          echo '{"name":"parse-gitignore","version":"2.0.0","main":"index.js"}' > node_modules/parse-gitignore/package.json
          echo 'module.exports = function() { return []; };' > node_modules/parse-gitignore/index.js
          node node_modules/.bin/patch-package 2>/dev/null || true

      - name: Build
        working-directory: boost-sdr-os/quickstart-react
        env:
          VITE_MONDAY_API_TOKEN: ${{ secrets.VITE_MONDAY_API_TOKEN }}
        run: npm run deploy:build

      - name: Deploy to Monday hosting
        working-directory: boost-sdr-os/quickstart-react
        env:
          MAPPS_ACCESS_TOKEN: ${{ secrets.MAPPS_ACCESS_TOKEN }}
        run: |
          echo "{\"accessToken\":\"$MAPPS_ACCESS_TOKEN\"}" > .mappsrc
          npm run deploy:push
